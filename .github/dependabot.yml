version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    commit-message:
      prefix: "ci"
    groups:
      actions-official:
        patterns:
          - "actions/*"
      docker:
        patterns:
          - "docker/*"
      security:
        patterns:
          - "github/codeql-action"
          - "aquasecurity/*"
          - "sigstore/*"
          - "softprops/*"
